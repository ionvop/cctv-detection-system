# RTSP detection worker — each replica claims CAMERAS_PER_WORKER cameras.
# For a single GPU node set replicas: 1 and tune CAMERAS_PER_WORKER.
# Requires NVIDIA Container Toolkit + device plugin (see nvidia-device-plugin.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: eyegila
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: eyegila/worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: REDIS_URL
            - name: FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: FERNET_KEY
            - name: CAMERAS_PER_WORKER
              value: "16"
            - name: INFERENCE_EVERY_N
              value: "1"
            - name: TRT_CACHE_DIR
              value: /app/trt_cache
          volumeMounts:
            - name: trt-cache
              mountPath: /app/trt_cache
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/worker-alive"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 2Gi
              cpu: 1
              nvidia.com/gpu: "1"
            limits:
              memory: 6Gi
              cpu: 2
              nvidia.com/gpu: "1"
      volumes:
        - name: trt-cache
          persistentVolumeClaim:
            claimName: trt-cache-pvc
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
