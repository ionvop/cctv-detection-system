apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: eyegila
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: eyegila/server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: REDIS_URL
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: VAPID_PUBLIC_KEY
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: VAPID_PRIVATE_KEY
            - name: SUPER_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: SUPER_KEY
            - name: UPLOAD_DIR
              value: /app/uploads
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: eyegila
spec:
  selector:
    app: server
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
