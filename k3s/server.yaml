apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: eyegila
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: eyegila/server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: REDIS_URL
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: VAPID_PUBLIC_KEY
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: VAPID_PRIVATE_KEY
            - name: SUPER_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: SUPER_KEY
            - name: FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: FERNET_KEY
            - name: UPLOAD_DIR
              value: /app/uploads
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: CORS_ORIGINS
            - name: TZ
              value: Asia/Manila
            - name: TRUST_PROXY_HEADERS
              value: "true"
            - name: SESSION_TTL_HOURS
              value: "24"
            - name: MAX_UPLOAD_MB
              value: "500"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: eyegila
spec:
  selector:
    app: server
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
