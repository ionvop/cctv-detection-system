apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: eyegila
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: eyegila
spec:
  serviceName: timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg16
          args:
            - postgres
            - -c
            - password_encryption=md5
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: traffic
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: timescaledb-pvc
        - name: init-sql
          configMap:
            name: timescaledb-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timescaledb-init
  namespace: eyegila
data:
  # Mount init.sql from the project. In practice, bake it into the image or
  # populate this ConfigMap from the file:
  #   kubectl create configmap timescaledb-init --from-file=init.sql=init.sql -n eyegila
  init.sql: ""
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: eyegila
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
