apiVersion: apps/v1
kind: Deployment
metadata:
  name: rq-worker
  namespace: eyegila
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rq-worker
  template:
    metadata:
      labels:
        app: rq-worker
    spec:
      containers:
        - name: rq-worker
          image: eyegila/rq-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: REDIS_URL
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: eyegila-secret
                  key: VAPID_PRIVATE_KEY
            - name: UPLOAD_DIR
              value: /app/uploads
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: 2
      volumes:
        - name: uploads
          emptyDir: {}
