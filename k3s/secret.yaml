# Fill in real values before applying.
# Generate base64: echo -n 'value' | base64
#
# VAPID keys are already generated - see .env in the project root.
# Run: echo -n '<key>' | base64  to encode each one.
apiVersion: v1
kind: Secret
metadata:
  name: eyegila-secret
  namespace: eyegila
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@pgbouncer:5432/traffic"
  POSTGRES_PASSWORD: "postgres"
  REDIS_URL: "redis://redis:6379"
  VAPID_PRIVATE_KEY: ""   # paste value from .env
  VAPID_PUBLIC_KEY: ""    # paste value from .env
  SUPER_KEY: ""           # set a strong random string for the admin API key
