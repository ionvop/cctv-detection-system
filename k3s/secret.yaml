# Fill in real values before applying.
# All values under stringData are plain text — kubectl encodes them automatically.
#
# VAPID keys: already generated, copy from .env in the project root.
# FERNET_KEY: generate with  python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
# SUPER_KEY:  any strong random string, used for the admin API key
apiVersion: v1
kind: Secret
metadata:
  name: eyegila-secret
  namespace: eyegila
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@pgbouncer:5432/traffic"
  POSTGRES_PASSWORD: "postgres"
  REDIS_URL: "redis://redis:6379"
  VAPID_PRIVATE_KEY: ""   # paste value from .env
  VAPID_PUBLIC_KEY: ""    # paste value from .env
  SUPER_KEY: ""           # set a strong random string
  FERNET_KEY: ""          # generate or leave blank to disable RTSP encryption
  CORS_ORIGINS: "http://localhost,http://127.0.0.1"
